services:
  # Backend API (Production on AWS)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dentalcrm-backend
    restart: unless-stopped
    ports:
      - '${PORT:-3001}:3001'
    environment:
      # Database (RDS PostgreSQL)
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-dental_crm}
      # JWT
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      # Email
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_SMTP_HOST: ${BREVO_SMTP_HOST:-smtp-relay.brevo.com}
      BREVO_SMTP_PORT: ${BREVO_SMTP_PORT:-587}
      BREVO_SMTP_USER: ${BREVO_SMTP_USER}
      BREVO_SMTP_PASSWORD: ${BREVO_SMTP_PASSWORD}
      BREVO_FROM: ${BREVO_FROM_EMAIL}
      BREVO_FRONTEND_URL: ${BREVO_FRONTEND_URL}
      # Server
      PORT: 3001
      NODE_ENV: production
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
